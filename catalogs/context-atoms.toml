purpose = """
Context primitives for AI runtimes — situational frames, environment descriptors,
conversation scopes, working-memory shapes, attention budgets. Composes with
agent-atoms and prompt-atoms so an agent's situational context is expressed as
typed, versioned, signed atoms rather than free-text prose dumped into a system
prompt."""
