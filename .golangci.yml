version: "2"

linters:
  default: none
  enable:
    - errcheck
    - gosec
    - gocyclo
    - misspell
  settings:
    gocyclo:
      min-complexity: 25
    errcheck:
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (io.Closer).Close
        - (io.ReadCloser).Close
        - os.Remove
        - os.RemoveAll
  exclusions:
    rules:
      - path: _test\.go
        linters: [errcheck, gosec]
      - linters: [errcheck]
        text: 'Error return value of.*\.Close.* is not checked'
      - linters: [gosec]
        text: "G104:|G107:|G110:|G204:|G301:|G304:|G306:|G702:|G703:|G115:|G122:"
