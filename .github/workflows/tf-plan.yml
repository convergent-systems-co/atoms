name: OpenTofu plan

on:
  pull_request:
    paths: ["infra/terraform/**"]

permissions:
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [dev, prod]
    steps:
      - uses: actions/checkout@v6
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.10.0"
      - name: Configure git credentials for core-infra (private) module fetch
        env:
          CORE_INFRA_READ_TOKEN: ${{ secrets.CORE_INFRA_READ_TOKEN }}
        run: |
          # Map https://github.com → token-authenticated form just for the
          # convergent-systems-co/core-infra fetch. The token is org-scoped
          # to Contents:Read on core-infra only.
          git config --global \
            "url.https://x-access-token:${CORE_INFRA_READ_TOKEN}@github.com/convergent-systems-co/core-infra.insteadOf" \
            "https://github.com/convergent-systems-co/core-infra"
      - name: fmt
        run: tofu fmt -recursive -check infra/
      - name: init
        run: tofu -chdir=infra/terraform/envs/${{ matrix.env }} init -backend=false
      - name: validate
        run: tofu -chdir=infra/terraform/envs/${{ matrix.env }} validate
      - name: plan
        run: tofu -chdir=infra/terraform/envs/${{ matrix.env }} plan -input=false || echo "Plan requires backend; skipping for now."
