name: Deploy to Cloudflare Pages

# Deploys only on push to main (i.e., after a PR has been merged).
# PR build verification lives in ci.yml — that catches broken Astro
# builds before merge without firing a Cloudflare Pages deploy per PR.
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install web/ deps
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Build web/
        working-directory: web
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web/dist --project-name=atoms-umbrella
